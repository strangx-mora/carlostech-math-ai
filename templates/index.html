<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CarlosTech Math AI</title>

<link rel="stylesheet" href="/static/style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathquill@0.10.1/build/mathquill.css">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathquill@0.10.1/build/mathquill.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>

<body>

<!-- BOTON MENU MOVIL -->

<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>CarlosTech</h2>

<a href="#" onclick="modoIntegral()">Integrales</a>

<a href="#">Gráficas</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="title">Motor Matemático IA</div>

<div class="subtitle">Resuelve integrales paso a paso</div>

<div class="card">

<!-- EDITOR -->

<div id="math-input" class="mathbox"></div>

<!-- LIMITES -->

<div class="limites">

<input id="limiteA" placeholder="Límite inferior">

<input id="limiteB" placeholder="Límite superior">

</div>

<button class="solve" onclick="resolver()">Resolver Integral</button>

<!-- TECLADO -->

<div class="keyboard">

<div class="key" onclick="insert('x')">x</div>
<div class="key" onclick="insert('^2')">x²</div>
<div class="key" onclick="insert('^3')">x³</div>

<div class="key" onclick="insert('+')">+</div>
<div class="key" onclick="insert('-')">−</div>

<div class="key" onclick="insert('*')">×</div>
<div class="key" onclick="insert('/')">÷</div>

<div class="key" onclick="insert('\\sqrt{}')">√</div>
<div class="key" onclick="insert('\\frac{}{}')">a/b</div>

<div class="key" onclick="insert('\\sin')">sin</div>
<div class="key" onclick="insert('\\cos')">cos</div>
<div class="key" onclick="insert('\\tan')">tan</div>

</div>

<!-- RESULTADO -->

<div id="resultado" class="result"></div>

<!-- PASOS -->

<div id="pasos" class="steps"></div>

</div>

</div>

<script>

let modo="integral";

var MQ = MathQuill.getInterface(2);

var mathField = MQ.MathField(document.getElementById('math-input'));

function insert(val){

mathField.write(val);
mathField.focus();

}

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("active");

}

function modoIntegral(){

modo="integral";

}

function resolver(){

let latex = mathField.latex();

let a = document.getElementById("limiteA").value;

let b = document.getElementById("limiteB").value;

fetch("/resolver",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
integral:latex,
a:a,
b:b
})

})

.then(res=>res.json())

.then(data=>{

document.getElementById("resultado").innerHTML=data.resultado;

if(data.pasos){

mostrarPasos(data.pasos);

}

MathJax.typeset();

})

}

function mostrarPasos(pasosHTML){

let contenedor=document.getElementById("pasos");

contenedor.innerHTML="";

let pasos=pasosHTML.split("<br>");

let i=0;

function mostrar(){

if(i>=pasos.length) return;

let div=document.createElement("div");

div.className="paso";

div.innerHTML=pasos[i];

contenedor.appendChild(div);

MathJax.typeset();

i++;

setTimeout(mostrar,600);

}

mostrar();

}

</script>

</body>

</html>
