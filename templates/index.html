<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CarlosTech Math AI</title>

<link rel="stylesheet" href="/static/style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathquill@0.10.1/build/mathquill.css">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathquill@0.10.1/build/mathquill.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- PLOTLY PARA GRÁFICAS -->
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
input::placeholder{
  color:rgba(226, 232, 240, 0.4);
}
</style>

</head>

<body>

<!-- BOTON MENU MOVIL -->

<div class="menu-btn" onclick="toggleSidebar()">☰</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>CarlosTech</h2>

<a href="#" onclick="modoIntegral()">Integrales</a>

<a href="#">Gráficas</a>

<hr style="margin: 20px 0; border: none; border-top: 1px solid rgba(255,255,255,0.1);">

<a href="/logout" style="color: #ff6b6b;">🚪 Cerrar sesión</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="title">Motor Matemático IA</div>

<div class="subtitle">Resuelve integrales paso a paso</div>

<div class="card">

<!-- EDITOR -->

<div id="math-input" class="mathbox"></div>

<!-- LIMITES -->

<div class="limites">

<input id="limiteA" placeholder="Límite inferior">

<input id="limiteB" placeholder="Límite superior">

</div>

<button class="solve" onclick="resolver()">Resolver Integral</button>

<!-- TECLADO -->

<div class="keyboard">

<div class="key" onclick="insert('x')">x</div>
<div class="key" onclick="insert('^2')">x²</div>
<div class="key" onclick="insert('^3')">x³</div>

<div class="key" onclick="insert('+')">+</div>
<div class="key" onclick="insert('-')">−</div>

<div class="key" onclick="insert('*')">×</div>
<div class="key" onclick="insert('/')">÷</div>

<div class="key" onclick="insert('\\sqrt{}')">√</div>
<div class="key" onclick="insert('\\frac{}{}')">a/b</div>

<div class="key" onclick="insert('\\sin')">sin</div>
<div class="key" onclick="insert('\\cos')">cos</div>
<div class="key" onclick="insert('\\tan')">tan</div>

</div>

<!-- RESULTADO -->

<div id="resultado" class="result"></div>

<!-- GRÁFICA -->

<div id="grafica-container" class="grafica-container">
  <div id="grafica" class="grafica"></div>
</div>

<!-- PASOS -->

<div id="pasos" class="steps"></div>

</div>

</div>

<script>

let modo="integral";

var MQ = MathQuill.getInterface(2);

var mathField = MQ.MathField(document.getElementById('math-input'));

function insert(val){

mathField.write(val);
mathField.focus();

}

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("active");

}

function modoIntegral(){

modo="integral";

}

function resolver(){

let latex = mathField.latex();

if(!latex || latex.trim() === ""){

alert("Por favor ingresa una expresión");

return;

}

let a = document.getElementById("limiteA").value || null;

let b = document.getElementById("limiteB").value || null;

// Mostrar estado de carga
document.getElementById("resultado").innerHTML = "<p style='color: #94a3b8;'>⏳ Resolviendo...</p>";
document.getElementById("pasos").innerHTML = "";
document.getElementById("grafica").innerHTML = "";

fetch("/resolver",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
integral:latex,
a:a,
b:b
})

})

.then(res=>res.json())

.then(data=>{

document.getElementById("resultado").innerHTML = data.resultado || data.error || "Error desconocido";

if(data.pasos){

mostrarPasos(data.pasos);

}

// Graficar la función
graficarFuncion(latex, a, b);

// Renderizar ecuaciones MathJax
MathJax.typeset();

})

.catch(err=>{

console.error("Error:", err);
document.getElementById("resultado").innerHTML = "<p style='color: #ff6b6b;'>❌ Error en la solicitud</p>";
document.getElementById("pasos").innerHTML = `<p style='color: #fca5a5;'>${err.message}</p>`;

})

}

function graficarFuncion(latex, a, b){

fetch("/graficar",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
integral:latex,
a:a,
b:b
})

})

.then(res=>res.json())

.then(data=>{

if(data.error){

console.error("Error en gráfica:", data.error);
document.getElementById("grafica").innerHTML = `<p style='color: #fca5a5; padding: 20px;'>⚠️ No se pudo graficar: ${data.error}</p>`;
return;

}

// Crear la traza de la función
let trace = {
x: data.x,
y: data.y,
mode: 'lines',
name: 'f(x)',
line: {color: '#3b82f6', width: 3},
hovertemplate: '<b>x:</b> %{x:.4f}<br><b>f(x):</b> %{y:.4f}<extra></extra>'
};

let traces = [trace];

// Si hay límites definidos, agregar el relleno
if(data.a !== null && data.b !== null && typeof data.a === 'number' && typeof data.b === 'number'){

let a_val = data.a;
let b_val = data.b;

// Crear puntos para llenar el área
let x_fill = [];
let y_fill = [];

for(let i = 0; i < data.x.length; i++){

if(data.x[i] >= a_val && data.x[i] <= b_val && data.y[i] !== null && isFinite(data.y[i])){

x_fill.push(data.x[i]);
y_fill.push(data.y[i]);

}

}

if(x_fill.length > 0){

let fillTrace = {
x: x_fill,
y: y_fill,
fill: 'tozeroy',
fillcolor: 'rgba(59, 130, 246, 0.25)',
line: {color: 'rgba(59, 130, 246, 0)'},
showlegend: true,
name: 'Área integral',
hoverinfo: 'skip'
};

traces.push(fillTrace);

}

}

let layout = {
title: {text: '📊 Gráfica de la Función', font: {color: '#e0e7ff', size: 18}},
xaxis: {
title: 'x',
color: '#cbd5e1',
gridcolor: 'rgba(226, 232, 240, 0.1)',
zeroline: true,
zerolinecolor: 'rgba(226, 232, 240, 0.2)'
},
yaxis: {
title: 'f(x)',
color: '#cbd5e1',
gridcolor: 'rgba(226, 232, 240, 0.1)',
zeroline: true,
zerolinecolor: 'rgba(226, 232, 240, 0.2)'
},
plot_bgcolor: 'rgba(15, 23, 42, 0.6)',
paper_bgcolor: 'rgba(30, 41, 59, 0.8)',
font: {color: '#cbd5e1', family: "'Segoe UI', 'Roboto', sans-serif"},
hovermode: 'closest',
margin: {t: 50, l: 70, r: 50, b: 70}
};

Plotly.newPlot('grafica', traces, layout, {responsive: true, displayModeBar: true});

})

.catch(err=>{

console.error("Error al graficar:", err);
document.getElementById("grafica").innerHTML = `<p style='color: #fca5a5; padding: 20px;'>⚠️ Error: ${err.message}</p>`;

})

}

function mostrarPasos(pasosHTML){

let contenedor=document.getElementById("pasos");

contenedor.innerHTML="<div style='color: #3b82f6; margin-bottom: 25px;'><h2 style='font-size: 22px; font-weight: 700; margin-bottom: 10px;'>📚 Pasos Detallados</h2><p style='color: #94a3b8; font-size: 14px;'>Motor Matemático Premium</p></div>";

// Mostrar los pasos como HTML completo
contenedor.innerHTML += pasosHTML;

// Re-renderizar las ecuaciones
setTimeout(() => MathJax.typeset(), 100);

}

</script>

</body>

</html>
